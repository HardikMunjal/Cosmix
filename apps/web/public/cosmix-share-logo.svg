  <rect x="120" y="470" width="330" height="68" rx="34" fill="#22d3ee" opacity="0.95"/>
  <text x="168" y="514" fill="#0f172a" font-family="Verdana, Geneva, sans-serif" font-size="30" font-weight="700">Open in Cosmix</text>
