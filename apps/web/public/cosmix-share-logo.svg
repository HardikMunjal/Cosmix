  <text x="120" y="250" fill="#e2e8f0" font-family="Verdana, Geneva, sans-serif" font-size="88" font-weight="700">Cosmix</text>
  <text x="120" y="330" fill="#bfdbfe" font-family="Verdana, Geneva, sans-serif" font-size="44" font-weight="500">Group Invite</text>
