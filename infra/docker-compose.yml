services:
  api-gateway:
    build:
      context: ..
      dockerfile: apps/api-gateway/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - chat-service
      - user-service

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "3001:3001"

  chat-service:
    build:
      context: ..
      dockerfile: services/chat-service/Dockerfile
    ports:
      - "3002:3002"

  user-service:
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    ports:
      - "3003:3003"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - "3005:3005"
    depends_on:
      - api-gateway
      - chat-service

  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cosmix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: