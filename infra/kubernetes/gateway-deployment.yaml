apiVersion: apps/v1
kind: Deployment
metadata:
  name: cosmix-api-gateway
  labels:
    app: cosmix
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cosmix-api-gateway
  template:
    metadata:
      labels:
        app: cosmix-api-gateway
    spec:
      containers:
        - name: api-gateway
          image: cosmix/api-gateway:latest
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              value: "postgres://user:password@postgres-service:5432/cosmix"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: cosmix-api-gateway