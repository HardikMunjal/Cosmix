apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  labels:
    app: chat
spec:
  replicas: 3
  selector:
    matchLabels:
      app: chat
  template:
    metadata:
      labels:
        app: chat
    spec:
      containers:
        - name: chat-service
          image: your-docker-repo/chat-service:latest
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              value: postgres://user:password@postgres-service:5432/cosmix
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: chat