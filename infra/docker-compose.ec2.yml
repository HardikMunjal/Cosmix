services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.ec2.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - chat-service
      - wellness-service

  api-gateway:
    build:
      context: ..
      dockerfile: apps/api-gateway/Dockerfile
    restart: unless-stopped
    depends_on:
      - auth-service
      - chat-service
      - user-service
      - wellness-service

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    restart: unless-stopped

  chat-service:
    build:
      context: ..
      dockerfile: services/chat-service/Dockerfile
    restart: unless-stopped

  user-service:
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    restart: unless-stopped

  wellness-service:
    build:
      context: ..
      dockerfile: services/wellness-service/Dockerfile
    restart: unless-stopped
    volumes:
      - ../services/wellness-service/data:/usr/src/app/data

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    volumes:
      - ../apps/web/data:/usr/src/app/data
    depends_on:
      - api-gateway
      - chat-service
      - wellness-service

  postgres:
    image: postgres:13
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-cosmix}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: