services:
  api-gateway:
    build:
      context: ..
      dockerfile: apps/api-gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - chat-service
      - user-service
      - wellness-service

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    restart: unless-stopped

  chat-service:
    build:
      context: ..
      dockerfile: services/chat-service/Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3002"

  user-service:
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    restart: unless-stopped

  wellness-service:
    build:
      context: ..
      dockerfile: services/wellness-service/Dockerfile
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "80:3005"
    depends_on:
      - api-gateway
      - chat-service
      - wellness-service

  postgres:
    image: postgres:13
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-cosmix}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: