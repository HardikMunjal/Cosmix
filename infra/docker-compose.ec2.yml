x-default-env: &default-env
  DATABASE_URL: ${DATABASE_URL:-postgres://user:password@postgres:5432/cosmix}

services:

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.ec2.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - chat-service
      - wellness-service

  api-gateway:
    build:
      context: ..
      dockerfile: apps/api-gateway/Dockerfile
    restart: unless-stopped
    environment: *default-env
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      chat-service:
        condition: service_started
      user-service:
        condition: service_started
      wellness-service:
        condition: service_started

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    restart: unless-stopped
    environment: *default-env
    depends_on:
      postgres:
        condition: service_healthy

  chat-service:
    build:
      context: ..
      dockerfile: services/chat-service/Dockerfile
    restart: unless-stopped
    environment: *default-env
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    restart: unless-stopped
    environment: *default-env
    depends_on:
      postgres:
        condition: service_healthy

  wellness-service:
    build:
      context: ..
      dockerfile: services/wellness-service/Dockerfile
    restart: unless-stopped
    environment: *default-env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../services/wellness-service/data:/usr/src/app/data

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      <<: *default-env
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      AWS_BUCKET: ${AWS_BUCKET:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      CHAT_S3_BUCKET: ${CHAT_S3_BUCKET:-}
    depends_on:
      postgres:
        condition: service_healthy
      api-gateway:
        condition: service_started
      chat-service:
        condition: service_started
      wellness-service:
        condition: service_started
    volumes:
      - ../apps/web/data:/usr/src/app/data

  postgres:
    image: postgres:13
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-cosmix}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-cosmix}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: